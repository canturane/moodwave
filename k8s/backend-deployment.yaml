apiVersion: apps/v1
kind: Deployment
metadata:
  name: moodwave-backend
  namespace: default
  labels:
    app: moodwave-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: moodwave-backend
  template:
    metadata:
      labels:
        app: moodwave-backend
    spec:
      containers:
        - name: backend
          image: moodwaveacr.azurecr.io/moodwave-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: moodwave-secrets
                  key: GEMINI_API_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: moodwave-backend-svc
  namespace: default
spec:
  selector:
    app: moodwave-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP