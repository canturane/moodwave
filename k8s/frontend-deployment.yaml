apiVersion: apps/v1
kind: Deployment
metadata:
  name: moodwave-frontend
  namespace: default
  labels:
    app: moodwave-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: moodwave-frontend
  template:
    metadata:
      labels:
        app: moodwave-frontend
    spec:
      containers:
        - name: frontend
          image: moodwaveacr.azurecr.io/moodwave-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: moodwave-frontend-svc
  namespace: default
spec:
  selector:
    app: moodwave-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer