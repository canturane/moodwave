services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: moodwave-backend:latest
    container_name: moodwave-backend
    restart: unless-stopped
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - moodwave-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: moodwave-frontend:latest
    container_name: moodwave-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - moodwave-network

networks:
  moodwave-network:
    driver: bridge