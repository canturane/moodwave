name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  BACKEND_IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/moodwave-backend
  FRONTEND_IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/moodwave-frontend

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build -t ${{ env.BACKEND_IMAGE }}:test ./backend

      - name: Build frontend image
        run: |
          docker build -t ${{ env.FRONTEND_IMAGE }}:test ./frontend

  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & Push backend
        run: |
          docker build -t ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }} \
                       -t ${{ env.BACKEND_IMAGE }}:latest ./backend
          docker push ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.BACKEND_IMAGE }}:latest

      - name: Build & Push frontend
        run: |
          docker build -t ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }} \
                       -t ${{ env.FRONTEND_IMAGE }}:latest ./frontend
          docker push ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.FRONTEND_IMAGE }}:latest

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Update K8s secret
        run: |
          kubectl create secret generic moodwave-secrets \
            --from-literal=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to AKS
        run: |
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl set image deployment/moodwave-backend backend=${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
          kubectl set image deployment/moodwave-frontend frontend=${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/moodwave-backend --timeout=300s
          kubectl rollout status deployment/moodwave-frontend --timeout=300s